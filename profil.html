          }

    <link rel="stylesheet" href="style.css" />

  </head>
  <body class="m-0 min-h-screen bg-black font-display text-pitch-text">
    <main class="profile-page">
      <picture class="home-background" aria-hidden="true">
        <source media="(max-width: 767px)" srcset="assets/images/decorphone.png" />
        <img class="home-background-image" src="assets/images/decordesktop.png" alt="" aria-hidden="true" draggable="false" />
      </picture>

      <section class="profile-shell">
        <header class="profile-topbar">
          <a class="profile-back" href="index.html" aria-label="Retounen sou akÃ¨y">
            <i data-lucide="arrow-left"></i>
          </a>
          <h1 class="profile-heading">Profil</h1>
          <div class="profile-topbar-spacer" aria-hidden="true"></div>
        </header>

        <section class="profile-panel">
          <div class="profile-identity">
            <div class="profile-avatar">
              <i data-lucide="user-round"></i>
            </div>
            <div class="profile-meta">
              <strong id="profile-username">Jwe</strong>
              <span id="profile-uid">ID jwÃ¨</span>
            </div>
          </div>

          <div class="profile-info-list">
            <div class="profile-info-row">
              <span>Non itilizate</span>
              <strong id="profile-username-inline">-</strong>
            </div>
            <div class="profile-info-row">
              <span>Coins disponibles</span>
              <strong id="profile-coins">0</strong>
            </div>
            <div class="profile-info-row">
              <span>Kont aktif</span>
              <strong>Wi</strong>
            </div>
          </div>
        </section>

        <section class="profile-panel">
          <h2 class="profile-section-title">Chanje modpas</h2>
          <p id="profile-feedback" class="auth-feedback" aria-live="polite"></p>

          <form id="password-form" class="auth-form">
            <label>
              <span>Nouvo modpas</span>
              <span class="auth-password">
                <input type="password" name="password" autocomplete="new-password" placeholder="Antre nouvo modpas la" />
                <button type="button" class="auth-password-toggle" data-password-toggle aria-label="Montre modpas la">
                  <i data-lucide="eye" aria-hidden="true"></i>
                </button>
              </span>
            </label>
            <label>
              <span>Konfime nouvo modpas la</span>
              <span class="auth-password">
                <input type="password" name="confirmPassword" autocomplete="new-password" placeholder="Retape nouvo modpas la" />
                <button type="button" class="auth-password-toggle" data-password-toggle aria-label="Montre modpas la">
                  <i data-lucide="eye" aria-hidden="true"></i>
                </button>
              </span>
            </label>
            <button type="submit" class="auth-submit">Mete ajou modpas</button>
          </form>
        </section>

        <section class="profile-panel profile-panel-actions">
          <button id="logout-button" class="profile-logout" type="button">Dekonekte</button>
        </section>
      </section>
    </main>

    <script type="module" src="profile.js"></script>
